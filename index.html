<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好市多購買記錄查詢</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 替換 FontAwesome -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 設定客製化顏色 (好市多經典藍與紅) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        costco: {
                            blue: '#005DAA',
                            red: '#E31837',
                            light: '#F3F4F6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 隱藏預設的檔案上傳按鈕，使用自訂 UI */
        input[type="file"] { display: none; }
        
        /* 載入動畫 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #005DAA;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- 頂部導覽列 -->
    <header class="bg-costco-blue text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-shopping-cart text-3xl"></i>
                <h1 class="text-2xl font-bold tracking-wider">好市多購買記錄查詢</h1>
            </div>
            <div class="text-sm opacity-80 hidden sm:block">
                Powered by GitHub Pages
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- 統計資訊區塊 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-costco-blue flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium mb-1">總消費金額</p>
                    <h2 class="text-3xl font-bold text-gray-800" id="totalAmount">NT$ 0</h2>
                </div>
                <div class="bg-blue-100 p-3 rounded-full text-costco-blue">
                    <i class="ph ph-currency-circle-dollar text-2xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-costco-red flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium mb-1">購買品項總數</p>
                    <h2 class="text-3xl font-bold text-gray-800" id="totalItems">0</h2>
                </div>
                <div class="bg-red-100 p-3 rounded-full text-costco-red">
                    <i class="ph ph-package text-2xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-green-500 flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-500 font-medium mb-1">記錄筆數</p>
                    <h2 class="text-3xl font-bold text-gray-800" id="totalRecords">0</h2>
                </div>
                <div class="bg-green-100 p-3 rounded-full text-green-600">
                    <i class="ph ph-receipt text-2xl"></i>
                </div>
            </div>
        </div>

        <!-- 操作控制區 (搜尋、篩選、匯入) -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 flex flex-col lg:flex-row gap-4 items-center justify-between">
            <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-3/4">
                <!-- 搜尋框 -->
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-magnifying-glass text-gray-400"></i>
                    </div>
                    <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-costco-blue focus:border-costco-blue sm:text-sm transition duration-150" placeholder="搜尋商品名稱...">
                </div>
                <!-- 日期搜尋框 (新增) -->
                <div class="relative w-full sm:w-48">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-calendar text-gray-400"></i>
                    </div>
                    <input type="text" id="dateInput" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-costco-blue focus:border-costco-blue sm:text-sm transition duration-150" placeholder="年份/月份 (例: 2024-04)">
                </div>
                <!-- 排序方式 -->
                <select id="sortFilter" class="block w-full sm:w-48 pl-3 pr-10 py-2 text-base border border-gray-300 focus:outline-none focus:ring-2 focus:ring-costco-blue focus:border-costco-blue sm:text-sm rounded-lg transition duration-150">
                    <option value="date-desc">日期 (新到舊)</option>
                    <option value="date-asc">日期 (舊到新)</option>
                    <option value="price-desc">金額 (高到低)</option>
                    <option value="price-asc">金額 (低到高)</option>
                </select>
            </div>

            <!-- Google Sheets 操作按鈕 -->
            <div class="w-full lg:w-auto flex justify-end gap-3">
                <button onclick="loadFromGoogleSheets()" class="bg-costco-blue hover:bg-blue-800 text-white px-4 py-2 rounded-lg font-medium transition duration-150 flex items-center gap-2 shadow-sm">
                    <i class="ph ph-arrows-clockwise text-lg"></i>
                    重新整理
                </button>
                <button onclick="openSettings()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg font-medium transition duration-150 flex items-center gap-2 shadow-sm">
                    <i class="ph ph-gear text-lg"></i>
                    API 設定
                </button>
            </div>
        </div>

        <!-- 訊息提示區 -->
        <div id="messageBox" class="hidden mb-6 p-4 rounded-lg flex items-start gap-3">
            <i class="ph ph-info text-xl mt-0.5" id="messageIcon"></i>
            <span id="messageText" class="break-words w-full"></span>
            <button onclick="hideMessage()" class="ml-auto text-gray-500 hover:text-gray-700">
                <i class="ph ph-x"></i>
            </button>
        </div>

        <!-- 資料表格 -->
        <div class="bg-white shadow-sm rounded-xl overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">商品</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">金額 (NT$)</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">數量</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">優惠折扣</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">折扣後金額 (NT$)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Javascript 會將資料注入這裡 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 分頁控制區 (新增) -->
            <div id="paginationContainer" class="bg-gray-50 px-4 py-3 border-t border-gray-200 sm:px-6 flex items-center justify-between hidden">
                <div class="flex-1 flex justify-between sm:hidden">
                    <button onclick="changePage(-1)" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">上一頁</button>
                    <button onclick="changePage(1)" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">下一頁</button>
                </div>
                <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-gray-700">
                            顯示第 <span id="pageStart" class="font-medium">1</span> 到 <span id="pageEnd" class="font-medium">10</span> 筆，共 <span id="pageTotal" class="font-medium">0</span> 筆記錄
                        </p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changePage(-1)" class="relative inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                            <i class="ph ph-caret-left mr-1"></i> 上一頁
                        </button>
                        <span class="text-sm text-gray-700 mx-2">
                            第 <span id="currentPageDisplay" class="font-bold text-costco-blue">1</span> / <span id="totalPagesDisplay">1</span> 頁
                        </span>
                        <button onclick="changePage(1)" class="relative inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                            下一頁 <i class="ph ph-caret-right ml-1"></i>
                        </button>
                        <div class="flex items-center ml-4 border-l pl-4 border-gray-300">
                            <span class="text-sm text-gray-700 mr-2">跳至</span>
                            <input type="number" id="jumpPageInput" min="1" class="w-16 px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-costco-blue" placeholder="頁碼">
                            <button onclick="jumpToPage()" class="ml-2 px-3 py-1 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50 transition duration-150">Go</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 無資料狀態 -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-gray-500 text-center px-4">
                <i class="ph ph-magnifying-glass text-6xl text-gray-300 mb-4"></i>
                <p class="text-lg mb-2">找不到符合的記錄或尚未載入資料</p>
                <p class="text-sm text-gray-400 max-w-md">如果一直載入失敗，可能是試算表未設定為「知道連結的任何人」，或是使用了無法公開連結的企業/學校帳號。</p>
                <button onclick="openSettings()" class="mt-4 text-costco-blue hover:underline font-medium">設定 Google Sheets API</button>
            </div>
        </div>

        <!-- API 設定 Modal -->
        <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-gray-800">Google Sheets API 設定</h3>
                    <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">API 金鑰 (選填)</label>
                        <input type="password" id="inputApiKey" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-costco-blue" placeholder="可先空白，輸入 AIzaSy...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">試算表 ID (可直接貼完整網址)</label>
                        <input type="text" id="inputSheetId" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-costco-blue" placeholder="輸入 ID 或貼上整段 URL">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">資料範圍 (多個工作表請用半形逗號 , 分隔)</label>
                        <input type="text" id="inputRange" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-costco-blue" placeholder="例如: 2023!A:F, 2024!A:F" value="工作表1!A:F">
                    </div>
                </div>
                <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                    <button onclick="closeSettings()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition duration-150">取消</button>
                    <button onclick="saveSettings()" class="bg-costco-blue hover:bg-blue-800 text-white px-4 py-2 rounded-lg transition duration-150">儲存並載入</button>
                </div>
            </div>
        </div>

        <!-- 載入中遮罩 -->
        <div id="loadingOverlay" class="hidden fixed inset-0 bg-white bg-opacity-80 z-40 flex flex-col items-center justify-center">
            <div class="loader mb-3"></div>
            <p class="text-costco-blue font-medium">正在從 Google Sheets 取得資料...</p>
        </div>

    </main>

    <script>
        // ==========================================
        // 💡 開發者設定區：你可以直接在這裡「寫死」預設的資料庫
        // ==========================================
        // ★ 1. 將你的試算表 ID 貼在單引號內，例如: '1qpyC0XzvTcKT6EISywvq2R...'
        // 只要填寫了這裡，以後打開網頁就會自動連線到你的試算表！
        const DEFAULT_SHEET_ID = '17a9hSVAKGnwBK3hbRoT-NVhlfJsjLVOBKeBZT2YE66k'; 
        
        // ★ 2. 預設的工作表名稱與範圍 (如果你有多個工作表，可用逗號隔開)
        const DEFAULT_RANGE = '工作表1!A:F'; 
        
        // ★ 3. (選填) 若有申請 API Key 可寫在這裡
        const DEFAULT_API_KEY = ''; 


        // --- 1. 狀態與設定資料 ---
        // 預設提供幾筆測試資料，增加重複購買記錄以測試漲跌功能
        let purchaseData = [
            { date: '2024-04-17', name: '【範例】科克蘭全脂鮮乳 1.89L x 2', price: 269, quantity: 1, discount: 0, total: 269 },
            { date: '2024-03-01', name: '【範例】科克蘭全脂鮮乳 1.89L x 2', price: 259, quantity: 1, discount: 0, total: 259 }, // 上次較便宜 (漲價)
            { date: '2024-04-15', name: '【範例】特價衛生紙', price: 389, quantity: 1, discount: -30, total: 359 },
            { date: '2024-02-15', name: '【範例】特價衛生紙', price: 389, quantity: 1, discount: 0, total: 389 }, // 價格持平
            { date: '2024-04-10', name: '【範例】KS 綜合堅果 1.13kg', price: 629, quantity: 1, discount: 0, total: 629 },
            { date: '2024-03-20', name: '【範例】AirPods Pro 2', price: 6899, quantity: 1, discount: -500, total: 6399 },
            { date: '2024-03-05', name: '【範例】維他命C錠 500粒', price: 499, quantity: 2, discount: 0, total: 998 },
            { date: '2024-01-10', name: '【範例】維他命C錠 500粒', price: 550, quantity: 1, discount: 0, total: 550 }, // 上次較貴 (降價)
            // 新增幾筆資料以測試分頁效果
            { date: '2023-12-25', name: '【範例】烤雞', price: 189, quantity: 1, discount: 0, total: 189 },
            { date: '2023-11-11', name: '【範例】無骨牛小排', price: 1450, quantity: 1, discount: -150, total: 1300 },
            { date: '2023-10-05', name: '【範例】日本進口洗衣精', price: 549, quantity: 2, discount: 0, total: 1098 },
            { date: '2023-09-20', name: '【範例】科克蘭全脂鮮乳 1.89L x 2', price: 259, quantity: 1, discount: 0, total: 259 }
        ];
        let currentData = [...purchaseData];
        
        // 分頁狀態
        let currentPage = 1;
        const itemsPerPage = 10;
        
        // 優先讀取瀏覽器紀錄，若無則讀取上方的「開發者設定區」變數
        let sheetConfig = {
            apiKey: localStorage.getItem('costco_apiKey') || DEFAULT_API_KEY,
            sheetId: localStorage.getItem('costco_sheetId') || DEFAULT_SHEET_ID,
            range: localStorage.getItem('costco_range') || DEFAULT_RANGE
        };

        // --- 工具函數：安全提取試算表 ID ---
        const extractSheetId = (input) => {
            if (!input) return '';
            const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : input.trim();
        };

        // --- 2. DOM 元素選取 ---
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const dateInput = document.getElementById('dateInput'); // 新增日期搜尋
        const sortFilter = document.getElementById('sortFilter');
        
        // 分頁元素
        const paginationContainer = document.getElementById('paginationContainer');
        const elPageStart = document.getElementById('pageStart');
        const elPageEnd = document.getElementById('pageEnd');
        const elPageTotal = document.getElementById('pageTotal');
        const elCurrentPage = document.getElementById('currentPageDisplay');
        const elTotalPages = document.getElementById('totalPagesDisplay');
        const jumpPageInput = document.getElementById('jumpPageInput');
        
        // 統計元素
        const elTotalAmount = document.getElementById('totalAmount');
        const elTotalItems = document.getElementById('totalItems');
        const elTotalRecords = document.getElementById('totalRecords');

        // 訊息框與 Modal
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const messageIcon = document.getElementById('messageIcon');
        const settingsModal = document.getElementById('settingsModal');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // --- 3. 核心功能函數 ---

        // 計算歷史價格趨勢 (漲跌)
        const calculateTrends = (data) => {
            // 1. 將資料依商品名稱分組
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.name]) grouped[item.name] = [];
                grouped[item.name].push(item);
            });

            // 2. 針對每個商品，按時間先後排序並比較價格
            for (let name in grouped) {
                // 依日期舊到新排序 (確保比較的是歷史順序)
                grouped[name].sort((a, b) => {
                    const timeA = new Date(a.date).getTime() || 0;
                    const timeB = new Date(b.date).getTime() || 0;
                    return timeA - timeB;
                });

                // 計算趨勢
                for (let i = 0; i < grouped[name].length; i++) {
                    if (i === 0) {
                        grouped[name][i].trend = 'first'; // 第一次購買
                        grouped[name][i].priceDiff = 0;
                    } else {
                        const prevPrice = grouped[name][i - 1].price;
                        const currPrice = grouped[name][i].price;
                        const diff = currPrice - prevPrice;
                        
                        grouped[name][i].priceDiff = diff;
                        if (diff > 0) grouped[name][i].trend = 'up';
                        else if (diff < 0) grouped[name][i].trend = 'down';
                        else grouped[name][i].trend = 'same';
                    }
                }
            }
        };

        // 格式化金錢
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(amount);
        };

        // 渲染表格 (加入分頁邏輯)
        const renderTable = (data) => {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.parentElement.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                paginationContainer.classList.add('hidden');
            } else {
                tableBody.parentElement.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                paginationContainer.classList.remove('hidden');

                // 計算分頁
                const totalPages = Math.ceil(data.length / itemsPerPage) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = Math.min(startIndex + itemsPerPage, data.length);
                const paginatedData = data.slice(startIndex, endIndex);

                // 更新分頁文字
                elPageStart.textContent = startIndex + 1;
                elPageEnd.textContent = endIndex;
                elPageTotal.textContent = data.length;
                elCurrentPage.textContent = currentPage;
                elTotalPages.textContent = totalPages;

                paginatedData.forEach(record => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-blue-50 transition duration-150';
                    
                    // 判斷折扣顯示，如果有折扣且不為 0，加上顏色標示
                    let discountDisplay = record.discount ? `<span class="text-red-500">${formatMoney(record.discount)}</span>` : '<span class="text-gray-400">-</span>';

                    // 判斷價格漲跌趨勢顯示
                    let trendHtml = '';
                    if (record.trend === 'up') {
                        trendHtml = `<span class="text-red-500 text-sm ml-1" title="比上次購買漲價 ${formatMoney(record.priceDiff)}"><i class="ph-bold ph-trend-up"></i></span>`;
                    } else if (record.trend === 'down') {
                        trendHtml = `<span class="text-green-500 text-sm ml-1" title="比上次購買降價 ${formatMoney(Math.abs(record.priceDiff))}"><i class="ph-bold ph-trend-down"></i></span>`;
                    } else if (record.trend === 'same') {
                        trendHtml = `<span class="text-gray-300 text-sm ml-1" title="價格與上次持平"><i class="ph-bold ph-minus"></i></span>`;
                    }

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${record.date}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${record.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 text-right">
                            <div class="flex items-center justify-end">
                                ${formatMoney(record.price)}
                                ${trendHtml}
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 text-right">${record.quantity}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-right">${discountDisplay}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-costco-blue text-right">${formatMoney(record.total)}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
            updateStats(data); // 統計數據維持計算「全部過濾後」的資料，不受分頁影響
        };

        // 分頁切換功能
        const changePage = (delta) => {
            const totalPages = Math.ceil(currentData.length / itemsPerPage);
            let newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderTable(currentData);
            }
        };

        // 跳轉到特定頁面
        const jumpToPage = () => {
            const page = parseInt(jumpPageInput.value);
            const totalPages = Math.ceil(currentData.length / itemsPerPage);
            
            if (!isNaN(page) && page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable(currentData);
                jumpPageInput.value = ''; // 清空輸入框
            } else {
                showMessage(`請輸入 1 到 ${totalPages} 之間的有效頁碼`, 'error');
            }
        };

        // 更新統計數字
        const updateStats = (data) => {
            const totalAmount = data.reduce((sum, item) => sum + item.total, 0);
            const totalItems = data.reduce((sum, item) => sum + parseInt(item.quantity), 0);
            
            elTotalAmount.textContent = formatMoney(totalAmount);
            elTotalItems.textContent = totalItems;
            elTotalRecords.textContent = data.length;
        };

        // 處理搜尋與過濾邏輯
        const filterData = () => {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const dateTerm = dateInput.value.trim(); // 取得日期搜尋字串
            const sortBy = sortFilter.value;

            currentData = purchaseData.filter(item => {
                // 將商品搜尋與日期搜尋分開處理
                const matchSearch = item.name.toLowerCase().includes(searchTerm);
                const matchDate = item.date.includes(dateTerm); 
                return matchSearch && matchDate;
            });

            currentData.sort((a, b) => {
                switch(sortBy) {
                    case 'date-desc': return new Date(b.date) - new Date(a.date);
                    case 'date-asc': return new Date(a.date) - new Date(b.date);
                    case 'price-desc': return b.total - a.total;
                    case 'price-asc': return a.total - b.total;
                    default: return 0;
                }
            });

            currentPage = 1; // 每次重新搜尋或排序時，回到第一頁
            renderTable(currentData);
        };

        // 顯示提示訊息
        const showMessage = (msg, type = 'success') => {
            messageText.innerHTML = msg;
            messageBox.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            
            if (type === 'success') {
                messageBox.classList.add('bg-green-100', 'text-green-800');
                messageIcon.className = 'ph ph-check-circle text-xl mt-0.5';
                setTimeout(hideMessage, 5000);
            } else {
                messageBox.classList.add('bg-red-100', 'text-red-800');
                messageIcon.className = 'ph ph-warning-circle text-xl mt-0.5';
            }
        };

        const hideMessage = () => {
            messageBox.classList.add('hidden');
        };

        // --- 4. Google Sheets API 整合 ---

        // 開啟/關閉設定 Modal
        const openSettings = () => {
            document.getElementById('inputApiKey').value = sheetConfig.apiKey;
            document.getElementById('inputSheetId').value = sheetConfig.sheetId;
            document.getElementById('inputRange').value = sheetConfig.range;
            settingsModal.classList.remove('hidden');
        };

        const closeSettings = () => {
            settingsModal.classList.add('hidden');
        };

        // 儲存設定
        const saveSettings = () => {
            sheetConfig.apiKey = document.getElementById('inputApiKey').value.trim();
            
            let rawId = document.getElementById('inputSheetId').value;
            sheetConfig.sheetId = extractSheetId(rawId);
            
            sheetConfig.range = document.getElementById('inputRange').value.trim() || '工作表1!A:F';

            localStorage.setItem('costco_apiKey', sheetConfig.apiKey);
            localStorage.setItem('costco_sheetId', sheetConfig.sheetId);
            localStorage.setItem('costco_range', sheetConfig.range);

            closeSettings();
            
            if (sheetConfig.sheetId) {
                loadFromGoogleSheets();
            } else {
                showMessage('請至少填寫試算表 ID', 'error');
            }
        };

        // 從 Google Sheets 載入資料
        const loadFromGoogleSheets = async () => {
            sheetConfig.sheetId = extractSheetId(sheetConfig.sheetId);
            // 只在有手動輸入過的時候才存進 localStorage
            if (sheetConfig.sheetId && sheetConfig.sheetId !== DEFAULT_SHEET_ID) {
                localStorage.setItem('costco_sheetId', sheetConfig.sheetId);
            }

            if (!sheetConfig.sheetId) {
                openSettings();
                showMessage('請先設定 Google 試算表 ID', 'error');
                return;
            }

            loadingOverlay.classList.remove('hidden');
            hideMessage();

            try {
                const ranges = sheetConfig.range.split(',').map(r => r.trim()).filter(r => r);
                if (ranges.length === 0) throw new Error('請填寫資料範圍');
                
                let allFetchedData = [];
                let isV4 = !!sheetConfig.apiKey;

                await Promise.all(ranges.map(async (currentRange) => {
                    let url;
                    if (isV4) {
                        url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetConfig.sheetId}/values/${currentRange}?key=${sheetConfig.apiKey}`;
                    } else {
                        let sheetName = currentRange.split('!')[0] || '工作表1';
                        sheetName = sheetName.replace(/^'|'$/g, '').trim();
                        url = `https://docs.google.com/spreadsheets/d/${sheetConfig.sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
                    }

                    console.log(`正在請求: ${url}`);
                    const response = await fetch(url);
                    const text = await response.text();
                    let currentSheetData = [];

                    if (isV4) {
                        const result = JSON.parse(text);
                        if (result.error) throw new Error(result.error.message || 'API 請求失敗');
                        if (result.values && result.values.length > 1) {
                            const rows = result.values.slice(1);
                            currentSheetData = rows.map(row => {
                                // 幫助函式：將字串中的逗號移除並轉為數字
                                const parseNum = (val) => parseFloat(String(val || '0').replace(/,/g, '')) || 0;
                                
                                return {
                                    date: row[0] || '未知日期',
                                    name: row[1] || '未命名商品',
                                    price: parseNum(row[2]),
                                    quantity: parseInt(row[3] || 1),
                                    discount: parseNum(row[4]),
                                    total: parseNum(row[5])
                                };
                            });
                        }
                    } else {
                        if (text.trim().startsWith('<')) {
                            throw new Error(
                                `<strong>讀取 ${currentRange} 失敗。</strong><br>` +
                                `<span class="text-xs mt-1 block text-gray-500">解析到的 ID: ${sheetConfig.sheetId.substring(0, 10)}...</span><br>` +
                                `請確認：<br>` + 
                                `1. 試算表 ID 或網址正確。<br>` + 
                                `2. 共用權限已設為「知道連結的任何人都可以查看」。<br>` +
                                `⚠️ 若您使用企業或學校帳號，管理員可能限制檔案對外公開。此情況請改填寫「API 金鑰」或用個人 Gmail 帳號。`
                            );
                        }

                        const startIndex = text.indexOf('{');
                        const endIndex = text.lastIndexOf('}');
                        
                        if (startIndex === -1 || endIndex === -1) {
                            throw new Error(`無法解析 ${currentRange} 的資料，請確認試算表是否存在。`);
                        }

                        const jsonString = text.substring(startIndex, endIndex + 1);
                        const result = JSON.parse(jsonString);
                        
                        if (result.status === 'error') {
                            throw new Error(result.errors[0].message || `載入 ${currentRange} 失敗，請確認名稱正確且已設為公開`);
                        }

                        if (result.table && result.table.rows && result.table.rows.length > 0) {
                            currentSheetData = result.table.rows.map(r => {
                                let rowData = r.c.map(cell => cell ? (cell.f !== undefined ? cell.f : cell.v) : '');
                                if (rowData[0] === '日期' || rowData[1] === '商品') return null;

                                const parseNum = (val) => parseFloat(String(val || '0').replace(/,/g, '')) || 0;

                                return {
                                    date: rowData[0] || '未知日期',
                                    name: rowData[1] || '未命名商品',
                                    price: parseNum(rowData[2]),
                                    quantity: parseInt(rowData[3] || 1),
                                    discount: parseNum(rowData[4]),
                                    total: parseNum(rowData[5])
                                };
                            }).filter(item => item !== null);
                        }
                    }
                    allFetchedData.push(...currentSheetData);
                }));

                purchaseData = allFetchedData;
                
                if (purchaseData.length === 0) {
                    showMessage('連線成功，但找不到任何資料。請確認工作表名稱與內容是否正確。', 'error');
                } else {
                    showMessage(`成功合併載入 ${purchaseData.length} 筆記錄！${!isV4 ? ' (免金鑰模式)' : ''}`);
                }
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                loadingOverlay.classList.add('hidden');
                calculateTrends(purchaseData); // 載入完畢後計算價格趨勢
                filterData();
            }
        };

        // --- 5. 事件監聽設定與初始化 ---
        searchInput.addEventListener('input', filterData);
        dateInput.addEventListener('input', filterData); // 監聽日期輸入
        sortFilter.addEventListener('change', filterData);
        
        // 監聽跳頁輸入框的 Enter 鍵
        jumpPageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                jumpToPage();
            }
        });

        if (sheetConfig.sheetId) {
            loadFromGoogleSheets();
        } else {
            calculateTrends(purchaseData); // 初始範例資料也要計算趨勢
            filterData();
        }
    </script>
</body>
</html>
